name: Build and Deploy Docs

on:
  push:
    branches: [main] # 当推送到 main 分支时触发

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. 拉取代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 设置 Node.js 环境
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22" # 根据你的项目调整

      # 3. 缓存 npm 依赖（加速构建）
      - name: Cache dependencies
        uses: actions/cache@v3
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      # 4. 安装依赖
      - name: Install dependencies
        run: npm install

      # 5. 构建静态网站
      - name: Build docs
        run: npm run docs:build

      # 6. 部署到 Ubuntu 服务器（使用 tar + scp）
      - uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: "${{ secrets.SSH_PRIVATE_KEY }}"

      - name: Deploy to Ubuntu Server
        uses: easingthemes/ssh-deploy@main # 第三方SSH部署插件
        env:
          SSH_PRIVATE_KEY: "${{ secrets.SERVER_SSH_KEY }}" # 从仓库密钥读取私钥
          REMOTE_HOST: "${{ secrets.SERVER_IP }}" # 服务器公网IP或域名
          REMOTE_USER: "${{ secrets.SERVER_USER }}"
          SOURCE: "dist/"
          TARGET: "/nfs-data/passjava/passjava-learning" # 服务器目标目录
          ARGS: "-avz --chown=ubuntu:ubuntu" # rsync参数：归档模式/压缩/删除多余文件
